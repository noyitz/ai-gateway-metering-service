apiVersion: apps/v1
kind: Deployment
metadata:
  name: metering-service
  labels:
    app: metering-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metering-service
  template:
    metadata:
      labels:
        app: metering-service
    spec:
      containers:
        - name: metering-service
          image: ghcr.io/noyitz/ai-gateway-metering-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: metering-db
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: metering-service
spec:
  ports:
    - port: 8080
  selector:
    app: metering-service
