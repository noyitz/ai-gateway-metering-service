apiVersion: v1
kind: Secret
metadata:
  name: metering-db
type: Opaque
stringData:
  DATABASE_URL: "postgres://metering:metering-dev@metering-postgresql:5432/metering?sslmode=disable"
  POSTGRES_USER: metering
  POSTGRES_PASSWORD: metering-dev
  POSTGRES_DB: metering
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metering-postgresql
  labels:
    app: metering-postgresql
spec:
  serviceName: metering-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: metering-postgresql
  template:
    metadata:
      labels:
        app: metering-postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: metering-db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: metering-postgresql
spec:
  ports:
    - port: 5432
  selector:
    app: metering-postgresql
  clusterIP: None
