<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaaS Dogfood Environment — Compression</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0e11;--bg-card:#181b1f;--border:#2c3138;--text:#e0e3e8;--text2:#8b949e;--blue:#58a6ff;--cyan:#39d2c0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px 20px 0 20px;margin:0}
</style>
</head>
<body>
<div style="display:flex;gap:4px;margin-bottom:16px">
  <a href="/dashboard" style="background:var(--bg-card);color:var(--text2);border:1px solid var(--border);padding:8px 20px;border-radius:6px;font-size:14px;text-decoration:none">Usage</a>
  <a href="/admin2" style="background:var(--bg-card);color:var(--text2);border:1px solid var(--border);padding:8px 20px;border-radius:6px;font-size:14px;text-decoration:none">Optimizer</a>
  <a href="/compression" style="background:var(--cyan);color:#fff;border:1px solid var(--cyan);padding:8px 20px;border-radius:6px;font-size:14px;text-decoration:none">Compression</a>
</div>
<iframe id="headroom-frame" style="width:100%;border:none;min-height:calc(100vh - 70px)" src=""></iframe>
<script>
// Resolve headroom dashboard URL: check query param, then default to cluster-internal route
const params = new URLSearchParams(window.location.search);
const headroomServiceUrl = params.get('headroom_url') || 'https://headroom-service-openshift-ingress.apps.' + window.location.hostname.split('.apps.')[1];
const dashboardUrl = params.get('dashboard_url') || 'https://headroom-dashboard-openshift-ingress.apps.' + window.location.hostname.split('.apps.')[1];
document.getElementById('headroom-frame').src = dashboardUrl + '/?url=' + encodeURIComponent(headroomServiceUrl);
</script>
</body>
</html>
