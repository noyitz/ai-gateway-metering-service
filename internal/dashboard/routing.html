<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaaS — Model Routing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d10;--c1:#12161d;--c2:#1a1f2a;--c3:#242b38;--bdr:#2a3242;
  --t:#e4e8ee;--t2:#7a8aa0;--blu:#4a9ef5;--grn:#3dcc6e;--org:#e8a830;
  --red:#e0524a;--pur:#a88cf8;--cyn:#3ad4c2;
}
body{background:var(--bg);color:var(--t);font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5}
.pg{max-width:1440px;margin:0 auto;padding:24px 32px}


/* 3-column: 1fr each, equal width */
.flow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;align-items:start;position:relative;min-height:400px}
.svg-layer{position:absolute;inset:0;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1}

.sec-hdr{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px;padding-left:4px}

/* Models */
.m-list{display:flex;flex-direction:column;gap:6px}
.m-card{
  background:var(--c1);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .15s;
}
.m-card:hover{border-color:var(--blu);background:var(--c2)}
.m-card.sel{border-color:var(--grn);background:linear-gradient(135deg,rgba(61,204,110,.08),var(--c1));box-shadow:0 0 20px rgba(61,204,110,.08)}
.m-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.m-name{font-size:13px;font-weight:700;flex:1}
.m-card.sel .m-name{color:var(--grn)}
.m-badge{font-size:7px;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:rgba(77,160,248,.12);color:var(--blu)}
.m-sub{font-size:10px;color:var(--t2)}
.m-provider{font-size:10px;color:var(--t2);margin-top:2px}
.m-provider strong{color:var(--t);font-weight:600}

/* Gateway box */
.gw{
  background:linear-gradient(165deg,#141d30,#0d1220);border:1.5px solid var(--blu);
  border-radius:12px;padding:16px;box-shadow:0 0 30px rgba(77,160,248,.1);
}
.gw-title{font-size:8px;color:var(--blu);text-transform:uppercase;letter-spacing:3px;font-weight:800;text-align:center;margin-bottom:6px}
.gw-profile{font-size:10px;color:var(--t2);text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(77,160,248,.15)}
.gw-profile strong{color:var(--t);font-weight:600}
.gw-label{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin:10px 0 6px 4px}
.plg{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;
  border:1px solid transparent;margin-bottom:2px;transition:all .15s;
}
.plg:hover{border-color:rgba(77,160,248,.3);background:rgba(77,160,248,.04)}
.plg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--grn);box-shadow:0 0 6px var(--grn)}
.plg-name{font-size:11px;font-weight:500;color:var(--t)}
.plg-div{border-top:1px dashed rgba(128,144,168,.2);margin:8px 4px}

/* Providers */
.p-list{display:flex;flex-direction:column;gap:6px}
.p-card{
  background:var(--c1);border:1px solid var(--bdr);border-radius:10px;
  padding:10px 14px;transition:all .15s;
}
.p-card.active{border-color:var(--grn);background:linear-gradient(135deg,rgba(61,204,110,.06),var(--c1));box-shadow:0 0 16px rgba(61,204,110,.06)}
.p-top{display:flex;align-items:center;justify-content:space-between}
.p-name{font-size:13px;font-weight:700}
.p-endpoint{font-size:10px;color:var(--t2);margin-top:2px}
.p-meta{display:flex;gap:6px;margin-top:5px}
.p-tag{font-size:7px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.p-tag.auth{background:rgba(77,160,248,.1);color:var(--blu)}
.p-tag.cred-ok{background:rgba(61,204,110,.1);color:var(--grn)}
.p-tag.cred-no{background:rgba(224,82,74,.1);color:var(--red)}

/* Route change — separate section below flow */
.route-section{
  margin-top:28px;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;
  padding:18px 24px;display:none;
}
.route-section.show{display:block}
.route-title{font-size:12px;font-weight:700;margin-bottom:4px}
.route-desc{font-size:11px;color:var(--t2);margin-bottom:12px}
.route-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.route-label{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.route-val{font-size:13px;font-weight:700}
.route-arrow{color:var(--t2);font-size:20px;text-align:center}
.route-select{
  width:100%;background:rgba(0,0,0,.3);color:var(--t);border:1px solid var(--bdr);
  padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;
}
.route-select:hover{border-color:var(--blu)}
.route-btn{
  margin-top:12px;padding:8px 24px;border-radius:8px;font-size:12px;cursor:pointer;
  border:none;font-weight:600;font-family:inherit;background:var(--grn);color:#fff;
  transition:all .15s;float:right;
}
.route-btn:hover{background:#45d676;transform:translateY(-1px)}
.route-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Flow lines */
.flow-line{stroke:var(--bdr);stroke-width:1.5;fill:none}
.flow-line.active{stroke:var(--grn);stroke-width:2}
.flow-dot{fill:var(--grn);filter:drop-shadow(0 0 3px var(--grn))}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 22px;border-radius:8px;font-size:12px;font-weight:600;transform:translateY(80px);opacity:0;transition:all .3s;z-index:1000;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--grn);color:#fff}
.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="pg">

<div style="display:flex;gap:4px;margin-bottom:16px">
  <a href="/dashboard" style="background:var(--c1);color:var(--t2);border:1px solid var(--bdr);padding:8px 20px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.3px">Usage</a>
  <a href="/routing" style="background:var(--blu);color:#fff;border:1px solid var(--blu);padding:8px 20px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.3px">Routing</a>
  <a href="/compression" style="background:var(--c1);color:var(--t2);border:1px solid var(--bdr);padding:8px 20px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.3px">Compression</a>
  <a href="/admin" style="background:var(--c1);color:var(--t2);border:1px solid var(--bdr);padding:8px 20px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.3px">Admin</a> <span id="user-badge" style="margin-left:auto;font-size:11px;color:#8090a8;display:flex;align-items:center;gap:6px"></span> <a href="#" onclick="fetch('/oauth/sign_out',{redirect:'manual'}).then(function(){window.location='/dashboard'});return false" style="background:transparent;color:var(--red,#e8554e);border:1px solid var(--bdr,#2e3848);padding:8px 16px;border-radius:6px;font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.3px">Logout</a>
</div>
<div style="font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:16px">Model Routing</div>

<div class="flow" id="flow">
  <div class="z1">
    <div class="sec-hdr">Models</div>
    <div class="m-list" id="mList"></div>
  </div>

  <div class="z1">
    <div class="sec-hdr">Inference Gateway</div>
    <div class="gw" id="gwBox">
      <div class="gw-title">IPP Pipeline</div>
      <div class="gw-profile" id="gwProfile">Loading...</div>
      <div class="gw-label">Request</div>
      <div id="reqPlugins"></div>
      <div class="plg-div"></div>
      <div class="gw-label">Response</div>
      <div id="resPlugins"></div>
    </div>
  </div>

  <div class="z1">
    <div class="sec-hdr">Providers</div>
    <div class="p-list" id="pList"></div>
  </div>

  <svg class="svg-layer" id="flowSvg"></svg>
</div>

<!-- Route change section — below the flow diagram -->
<div class="route-section" id="routeSection">
  <div class="route-title" id="routeTitle">Change Route</div>
  <div class="route-desc">Switch which provider serves this model's requests</div>
  <div class="route-grid">
    <div>
      <div class="route-label">Model</div>
      <div class="route-val" id="routeModel">—</div>
    </div>
    <div class="route-arrow">→</div>
    <div>
      <div class="route-label">Route to Provider</div>
      <select class="route-select" id="routeSelect" onchange="routeChanged()"></select>
    </div>
  </div>
  <button class="route-btn" id="routeBtn" onclick="applyRoute()" disabled>Apply Route Change</button>
  <div style="clear:both"></div>
</div>

<div id="toast" class="toast"></div>
</div>

<script>
var models=[],providers=[],config=null,selected=null;

function api(u){return fetch(u).then(function(r){if(!r.ok)throw new Error(r.statusText);return r.json()})}

var PC={'anthropic':'var(--org)','openai':'var(--grn)','azure':'var(--blu)','vertex':'var(--pur)','bedrock':'var(--red)'};

function init(){
  Promise.all([api('/api/v1/admin/models'),api('/api/v1/admin/providers'),api('/api/v1/admin/config')])
  .then(function(r){
    models=r[0]||[];providers=r[1]||[];config=r[2];
    renderPlugins();renderProviders();renderModels();
    if(models.length>0&&!selected)selectModel(models[0].name);
    else if(selected)selectModel(selected);
  })
  .catch(function(e){toast('Failed: '+e.message,'err')});
}

function friendlyName(m){
  if(m.providerRefs&&m.providerRefs.length>0&&m.providerRefs[0].targetModel)return m.providerRefs[0].targetModel;
  return m.targetModel||m.name;
}

function modelProvider(m){
  if(m.providerRefs&&m.providerRefs.length>0)return m.providerRefs[0].providerName;
  return m.provider||'';
}

function modelFormat(m){
  if(m.providerRefs&&m.providerRefs.length>0)return m.providerRefs[0].apiFormat;
  return '';
}

function renderModels(){
  var c=document.getElementById('mList');
  c.innerHTML=models.map(function(m){
    var fn=friendlyName(m),pn=modelProvider(m),sel=m.name===selected;
    return '<div class="m-card'+(sel?' sel':'')+'" data-m="'+m.name+'" onclick="selectModel(\''+m.name+'\')">'
      +'<div class="m-top"><div class="m-name">'+fn+'</div><span class="m-badge">external</span></div>'
      +'<div class="m-sub">'+m.name+'</div>'
      +'<div class="m-provider">via <strong>'+pn+'</strong></div>'
      +'</div>';
  }).join('');
}

function renderPlugins(){
  if(!config||!config.profiles||config.profiles.length===0)return;
  var p=config.profiles[0];
  document.getElementById('gwProfile').innerHTML='Profile: <strong>'+p.name+'</strong>';
  document.getElementById('reqPlugins').innerHTML=(p.requestPlugins||[]).map(function(n){
    return '<div class="plg"><div class="plg-dot"></div><div class="plg-name">'+n+'</div></div>';
  }).join('');
  document.getElementById('resPlugins').innerHTML=(p.responsePlugins||[]).map(function(n){
    return '<div class="plg"><div class="plg-dot"></div><div class="plg-name">'+n+'</div></div>';
  }).join('');
}

function renderProviders(){
  var c=document.getElementById('pList');
  var model=models.find(function(m){return m.name===selected});
  var activeP=model?modelProvider(model):'';

  c.innerHTML=providers.map(function(p){
    var act=p.name===activeP||p.provider===activeP;
    var color=PC[p.provider]||'var(--t2)';
    return '<div class="p-card'+(act?' active':'')+'" data-p="'+p.name+'">'
      +'<div class="p-top"><div class="p-name" style="color:'+color+'">'+p.provider+'</div></div>'
      +'<div class="p-endpoint">'+p.endpoint+'</div>'
      +'<div class="p-meta">'
      +'<span class="p-tag auth">'+p.authType+'</span>'
      +'<span class="p-tag '+(p.hasCredentials?'cred-ok':'cred-no')+'">'+(p.hasCredentials?'key ready':'no key')+'</span>'
      +'</div></div>';
  }).join('');
}

function selectModel(name){
  selected=name;
  renderModels();renderProviders();updateRouteSection();
  setTimeout(drawLines,30);
}

function updateRouteSection(){
  var sec=document.getElementById('routeSection');
  var model=models.find(function(m){return m.name===selected});
  if(!model){sec.classList.remove('show');return}

  sec.classList.add('show');
  document.getElementById('routeModel').textContent=friendlyName(model)+' ('+model.name+')';
  document.getElementById('routeTitle').textContent='Change Route: '+friendlyName(model);

  var curP=modelProvider(model);
  var sel=document.getElementById('routeSelect');
  sel.innerHTML=providers.map(function(p){
    return '<option value="'+p.name+'"'+(p.name===curP||p.provider===curP?' selected':'')+'>'+p.provider+' — '+p.endpoint+'</option>';
  }).join('');
  document.getElementById('routeBtn').disabled=true;
}

function routeChanged(){
  var model=models.find(function(m){return m.name===selected});
  var curP=modelProvider(model);
  var newP=document.getElementById('routeSelect').value;
  document.getElementById('routeBtn').disabled=(newP===curP);
}

function applyRoute(){
  var model=models.find(function(m){return m.name===selected});
  var newP=document.getElementById('routeSelect').value;
  var prov=providers.find(function(p){return p.name===newP});
  if(!model||!prov)return;

  fetch('/api/v1/admin/models/provider/'+model.name,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({providerName:newP,targetModel:friendlyName(model),apiFormat:modelFormat(model)||'openai-chat'})
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(t)});
    toast('Route updated: '+model.name+' → '+prov.provider,'ok');
    setTimeout(init,500);
  }).catch(function(e){toast('Error: '+e.message,'err')});
}

function drawLines(){
  var svg=document.getElementById('flowSvg'),flow=document.getElementById('flow');
  if(!svg||!flow)return;
  var fr=flow.getBoundingClientRect();
  svg.setAttribute('viewBox','0 0 '+fr.width+' '+fr.height);svg.innerHTML='';

  var sel=document.querySelector('.m-card.sel'),gw=document.getElementById('gwBox');
  if(!sel||!gw)return;

  var sr=sel.getBoundingClientRect(),gr=gw.getBoundingClientRect();
  var sR=sr.right-fr.left,sY=sr.top+sr.height/2-fr.top;
  var gL=gr.left-fr.left,gR=gr.right-fr.left,gY=gr.top+gr.height/2-fr.top;

  line(svg,sR,sY,gL,gY,true);
  animDots(svg,sR,sY,gL,gY,3);

  var ap=document.querySelector('.p-card.active');
  if(ap){
    var pr=ap.getBoundingClientRect();
    var pL=pr.left-fr.left,pY=pr.top+pr.height/2-fr.top;
    var mx=gR+(pL-gR)*0.4;
    line(svg,gR,gY,mx,gY,true);
    curv(svg,mx,gY,pL,pY,true,'c0');
    animDots(svg,gR,gY,mx,gY,2);
    pathDots(svg,'c0',3);
  }
}

function svgE(t){return document.createElementNS('http://www.w3.org/2000/svg',t)}
function line(s,x1,y1,x2,y2,a){var l=svgE('line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.className.baseVal=a?'flow-line active':'flow-line';s.appendChild(l)}
function curv(s,x1,y1,x2,y2,a,id){var cx=x1+(x2-x1)*.35,p=svgE('path');p.setAttribute('d','M '+x1+','+y1+' C '+cx+','+y1+' '+cx+','+y2+' '+x2+','+y2);p.className.baseVal=a?'flow-line active':'flow-line';p.setAttribute('id',id);s.appendChild(p)}
function animDots(s,x1,y1,x2,y2,n){for(var i=0;i<n;i++){var d=svgE('circle');d.setAttribute('r','2.5');d.className.baseVal='flow-dot';var ax=svgE('animate');ax.setAttribute('attributeName','cx');ax.setAttribute('from',x1);ax.setAttribute('to',x2);ax.setAttribute('dur','2s');ax.setAttribute('repeatCount','indefinite');ax.setAttribute('begin',i*.6+'s');var ay=svgE('animate');ay.setAttribute('attributeName','cy');ay.setAttribute('from',y1);ay.setAttribute('to',y2);ay.setAttribute('dur','2s');ay.setAttribute('repeatCount','indefinite');ay.setAttribute('begin',i*.6+'s');d.appendChild(ax);d.appendChild(ay);s.appendChild(d)}}
function pathDots(s,pid,n){for(var i=0;i<n;i++){var d=svgE('circle');d.setAttribute('r','2.5');d.className.baseVal='flow-dot';var am=svgE('animateMotion');am.setAttribute('dur','1.8s');am.setAttribute('repeatCount','indefinite');am.setAttribute('begin',i*.5+'s');var mp=svgE('mpath');mp.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+pid);am.appendChild(mp);d.appendChild(am);s.appendChild(d)}}

function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(function(){e.className='toast'},3000)}
window.addEventListener('resize',function(){if(selected)requestAnimationFrame(drawLines)});
init();
</script>
<script>fetch("/whoami").then(function(r){return r.json()}).then(function(d){var el=document.getElementById("user-badge");if(d.user&&el){var isAdmin=d.user==="admin";el.innerHTML=isAdmin?"<span style=\"color:#3dcc6e;font-weight:700\">⬤ admin</span> <span style=\"font-size:10px;color:#5a6a7a\">(cluster admin)</span>":"<span style=\"color:#4da0f8;font-weight:700\">⬤ "+d.user+"</span> <span style=\"font-size:10px;color:#5a6a7a\">(GitHub)</span>"}}).catch(function(){})</script></body>
</html>
