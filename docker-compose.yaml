services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metering
      POSTGRES_PASSWORD: metering-dev
      POSTGRES_DB: metering
    ports:
      - "5432:5432"

  metering-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://metering:metering-dev@postgres:5432/metering?sslmode=disable
    depends_on:
      - postgres
